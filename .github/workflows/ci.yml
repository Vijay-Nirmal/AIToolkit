name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AIToolkit.slnx

      - name: Build
        run: dotnet build AIToolkit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AIToolkit.slnx --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/AIToolkit.Sql.SqlServer/AIToolkit.Sql.SqlServer.csproj --configuration Release --no-build -p:ContinuousIntegrationBuild=true

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*